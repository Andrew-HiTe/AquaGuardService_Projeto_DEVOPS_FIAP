# Configurações do Servidor
server.port=8080
spring.application.name=AquaGuardService

# Configurações do Banco de Dados Oracle (Docker)
# URL, usuário e senha serão definidos no docker-compose.yml
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=AQUAGUARD_USER
spring.datasource.password=password

# Configurações JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Configurações Flyway (Migrações)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=AQUAGUARD_USER
spring.flyway.baseline-on-migrate=true
